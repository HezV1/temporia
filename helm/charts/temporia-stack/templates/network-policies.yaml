{{- /*
  Default-deny network policies for all workload namespaces.
  The Omnissiah permits no unauthorized data-spirit to pass through the gate.

  Each workload namespace gets:
    - default-deny-ingress: block all inbound unless explicitly allowed
    - default-deny-egress:  block all outbound unless explicitly allowed
    - allow-dns-egress:     permit UDP/TCP 53 to kube-dns (required for all pods)
*/ -}}
{{- $workloadNamespaces := list .Values.namespaces.defensive .Values.namespaces.offensive .Values.namespaces.logging .Values.namespaces.ai -}}

{{- range $ns := $workloadNamespaces }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ $ns }}
  labels:
    project: temporia
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ $ns }}
  labels:
    project: temporia
    policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ $ns }}
  labels:
    project: temporia
    policy-type: allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
